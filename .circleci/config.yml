version: 2.1

jobs:
  test:
    docker:
      - image: cimg/node:20.11
      - image: cimg/postgres:15.0
        environment:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: notification_db_test

    environment:
      NODE_ENV: test
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_DATABASE: notification_db_test
      JWT_SECRET: super-secret-key

    steps:
      - checkout
      - restore_cache:
          keys:
            - v1-deps-{{ checksum "package-lock.json" }}
      - run:
          name: Install dependencies
          command: npm install
      - save_cache:
          key: v1-deps-{{ checksum "package-lock.json" }}
          paths:
            - node_modules
      - run:
          name: Run E2E tests
          command: npm run test:e2e
      - run:
          name: Run coverage and report to Coveralls
          command: npm run test:coveralls
      - store_artifacts:
          path: coverage

workflows:
  build-and-test:
    jobs:
      - test